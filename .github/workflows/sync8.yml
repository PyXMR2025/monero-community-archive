name: 同步 cuprate
on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub GitPython pyyaml

      - name: 执行同步脚本
        env:
          GH_TOKEN3: ${{ secrets.GH_TOKEN2 }}
        run: python sync8.py
