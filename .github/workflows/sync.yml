name: 同步 Issue/PR/Release
on:
  schedule:
    - cron: '0 12 * * *' # 每日UTC 12:00执行
  workflow_dispatch: # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予Git推送权限
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub GitPython pyyaml

      - name: 执行同步脚本
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python sync.py